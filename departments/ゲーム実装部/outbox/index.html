<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPACE SHUTTLE — Shooting Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #ffffff;
    }

    #wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #gameCanvas {
      display: block;
      width: 400px;
      height: 600px;
      border: 2px solid #333;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #controls {
      font-size: 12px;
      color: #666;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="controls">
      MOVE: Arrow Keys &nbsp;|&nbsp; SHOOT: A Key &nbsp;|&nbsp; START: Space / Enter &nbsp;|&nbsp; RETRY: R Key
    </div>
  </div>

  <!--
    読み込み順序（依存関係に従う）:
    collision.js → background.js → bullet.js → enemy.js → player.js → game.js
    統合時に追加するモジュール（ビジュアル部・サウンド部）は player.js / enemy.js より前に挿入:
      <script src="ship_visual.js"></script>
      <script src="enemy_visual.js"></script>
      <script src="goal_visual.js"></script>
      <script src="sound.js"></script>
  -->
  <script src="collision.js"></script>
  <script src="background.js"></script>
  <script src="bullet.js"></script>
  <script src="enemy.js"></script>
  <script src="player.js"></script>
  <script src="game.js"></script>
</body>
</html>
